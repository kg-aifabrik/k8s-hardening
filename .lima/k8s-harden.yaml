vmType: vz
arch: aarch64
cpus: 4
memory: 6GiB
disk: 30GiB

images:
  - location: "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-arm64.img"
    arch: aarch64

mounts:
  - location: "~"
    writable: false

ssh:
  loadDotSSHPubKeys: true

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux
      swapoff -a
      sed -i '/ swap / s/^/#/' /etc/fstab || true
