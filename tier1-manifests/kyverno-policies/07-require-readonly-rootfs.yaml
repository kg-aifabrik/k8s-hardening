# Require read-only root filesystem.
# Hardening beyond strict CIS - reduces blast radius of container compromise.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-readonly-rootfs
  annotations:
    policies.kyverno.io/title: Require Read-only Root Filesystem
    policies.kyverno.io/category: Hardening
    policies.kyverno.io/severity: low
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: readonly-rootfs
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system, kyverno, kube-bench-scan]
      validate:
        message: "readOnlyRootFilesystem must be true. Mount emptyDir for writable paths."
        pattern:
          spec:
            =(initContainers):
              - securityContext:
                  readOnlyRootFilesystem: true
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true
