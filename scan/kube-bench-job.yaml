# kube-bench scanner - DaemonSet so every node (control plane + workers)
# is scanned. A Job won't suffice: master/etcd/controlplane CIS controls
# are only detectable when kube-bench runs ON the control-plane node, and
# in a real cluster that node carries a NoSchedule taint that an
# unprivileged Job won't tolerate.
#
# The container runs kube-bench once and then sleeps so `kubectl logs`
# can pick up the complete JSON. The orchestrator polls each pod's logs
# until they parse, then aggregates pass/fail/warn across all pods.
#
# Reference: https://github.com/aquasecurity/kube-bench
---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-bench-scan
  labels:
    pod-security.kubernetes.io/enforce: privileged  # kube-bench needs hostPath
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-bench
  namespace: kube-bench-scan
spec:
  selector:
    matchLabels:
      app: kube-bench
  template:
    metadata:
      labels:
        app: kube-bench
    spec:
      hostPID: true
      # Tolerate everything so we land on tainted control-plane nodes too.
      tolerations:
        - operator: Exists
      restartPolicy: Always
      containers:
        - name: kube-bench
          image: docker.io/aquasec/kube-bench:v0.10.4
          # No explicit --targets: kube-bench auto-detects which components
          # (master/controlplane/node/etcd/policies) are present on the host.
          command: ["sh", "-c"]
          args:
            - |
              kube-bench run --json
              # Keep the pod alive so logs remain retrievable. The
              # orchestrator deletes the DaemonSet when it's done.
              sleep 86400
          volumeMounts:
            - { name: var-lib-etcd,         mountPath: /var/lib/etcd,         readOnly: true }
            - { name: var-lib-kubelet,      mountPath: /var/lib/kubelet,      readOnly: true }
            - { name: var-lib-kube-sched,   mountPath: /var/lib/kube-scheduler, readOnly: true }
            - { name: var-lib-kube-ctrl,    mountPath: /var/lib/kube-controller-manager, readOnly: true }
            - { name: etc-systemd,          mountPath: /etc/systemd,          readOnly: true }
            - { name: lib-systemd,          mountPath: /lib/systemd/,         readOnly: true }
            - { name: srv-kubernetes,       mountPath: /srv/kubernetes/,      readOnly: true }
            - { name: etc-kubernetes,       mountPath: /etc/kubernetes,       readOnly: true }
            - { name: usr-bin,              mountPath: /usr/local/mount-from-host/bin, readOnly: true }
            - { name: etc-cni-netd,         mountPath: /etc/cni/net.d/,       readOnly: true }
            - { name: opt-cni-bin,          mountPath: /opt/cni/bin/,         readOnly: true }
      volumes:
        - { name: var-lib-etcd,        hostPath: { path: /var/lib/etcd } }
        - { name: var-lib-kubelet,     hostPath: { path: /var/lib/kubelet } }
        - { name: var-lib-kube-sched,  hostPath: { path: /var/lib/kube-scheduler } }
        - { name: var-lib-kube-ctrl,   hostPath: { path: /var/lib/kube-controller-manager } }
        - { name: etc-systemd,         hostPath: { path: /etc/systemd } }
        - { name: lib-systemd,         hostPath: { path: /lib/systemd } }
        - { name: srv-kubernetes,      hostPath: { path: /srv/kubernetes } }
        - { name: etc-kubernetes,      hostPath: { path: /etc/kubernetes } }
        - { name: usr-bin,             hostPath: { path: /usr/bin } }
        - { name: etc-cni-netd,        hostPath: { path: /etc/cni/net.d/ } }
        - { name: opt-cni-bin,         hostPath: { path: /opt/cni/bin/ } }
