# `cron-pinger` — CronJob (every 1 min) that GETs api/status/200 and,
# on success, writes a timestamp to redis. Verify Job reads the
# timestamp to confirm at least one run has succeeded.
#
# redis:7-alpine has redis-cli; we apk-add curl at runtime (~3s).
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron-pinger
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels: { app: cron-pinger }
        spec:
          serviceAccountName: workload-runtime
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: pinger
              image: docker.io/library/redis:7-alpine
              imagePullPolicy: IfNotPresent
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  # alpine ships wget by default; use that instead of curl
                  # so we don't need an apk install on every CronJob run.
                  wget -qO- --timeout=5 --tries=1 http://api/status/200 >/dev/null
                  redis-cli -h cache SET cron-pinger:last-success "$(date -u +%FT%TZ)"
                  echo "ping ok at $(date -u +%FT%TZ)"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: [ALL] }
              resources:
                requests: { cpu: 5m, memory: 16Mi }
                limits:   { cpu: 50m, memory: 64Mi }
