# `db` — PostgreSQL StatefulSet (1 replica). Stateful + persistent
# storage + headless Service for pod DNS.
#
# Uses the OFFICIAL `postgres:16-alpine` (Bitnami's docker.io tags were
# pulled in mid-2025). The official image's entrypoint detects non-root
# startup and skips the chown step — fsGroup makes the PVC writable.
# PGDATA points at a subdir so the entrypoint sees an empty dir on
# first run (Kubernetes mounts /var/lib/postgresql/data with a
# `lost+found` on some CSI drivers).
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  username: postgres
  password: not-a-real-password-please-change
---
apiVersion: v1
kind: Service
metadata:
  name: db
  labels: { app: db }
spec:
  clusterIP: None
  selector: { app: db }
  ports:
    - { name: postgres, port: 5432, targetPort: postgres }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
spec:
  serviceName: db
  replicas: 1
  selector: { matchLabels: { app: db } }
  template:
    metadata:
      labels: { app: db }
    spec:
      serviceAccountName: workload-runtime
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # postgres uid in the official alpine image is 70.
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: postgres
          image: docker.io/library/postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 5432, name: postgres }
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: db-credentials, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: db-credentials, key: password } }
            - name: POSTGRES_DB
              value: postgres
            # Use a subdirectory so first-run sees an empty dir even on
            # CSI volumes that auto-create `lost+found`.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -h 127.0.0.1"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -h 127.0.0.1"]
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - { name: data,    mountPath: /var/lib/postgresql/data }
            - { name: scratch, mountPath: /tmp }
            # postgres init writes to /var/run/postgresql for the unix socket.
            - { name: var-run, mountPath: /var/run/postgresql }
      volumes:
        - name: scratch
          emptyDir: {}
        - name: var-run
          emptyDir: {}
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests: { storage: 1Gi }
