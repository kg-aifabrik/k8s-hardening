# `tls-cert` — a `Certificate` CR that asks cert-manager (installed in
# admin v1) to issue a TLS cert from the cluster-wide self-signed
# ClusterIssuer. The resulting Secret would be mounted by `web` in a
# real deployment; for this framework test we just confirm the
# Certificate CR reports Ready.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: web-tls
spec:
  secretName: web-tls
  duration: 24h
  renewBefore: 1h
  commonName: web.local
  dnsNames:
    - web.local
    - web.default.svc.cluster.local
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
    group: cert-manager.io
