# `cache` — Redis Deployment. In-memory, no persistence (emptyDir for
# scratch). Used by queue-worker and cron-pinger as shared state.
#
# Uses OFFICIAL `redis:7-alpine`. The redis image runs as the redis
# user (uid 999) and listens on 6379 with no auth by default.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache
  labels: { app: cache }
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector: { matchLabels: { app: cache } }
  template:
    metadata:
      labels: { app: cache }
    spec:
      serviceAccountName: workload-runtime
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: redis
          image: docker.io/library/redis:7-alpine
          imagePullPolicy: IfNotPresent
          command: ["redis-server"]
          args: ["--save", "", "--appendonly", "no", "--protected-mode", "no"]
          ports:
            - { containerPort: 6379, name: redis }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
          readinessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - { name: data,    mountPath: /data }
            - { name: scratch, mountPath: /tmp }
      volumes:
        - name: data
          emptyDir: {}
        - name: scratch
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cache
  labels: { app: cache }
spec:
  selector: { app: cache }
  ports:
    - { name: redis, port: 6379, targetPort: redis }
