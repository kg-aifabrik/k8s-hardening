# `queue-worker` — background Deployment that LPUSHes to a redis list
# every 5s. Stand-in for the "consumer of a queue" pattern.
#
# Uses redis:7-alpine for the bundled redis-cli.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  labels: { app: queue-worker }
spec:
  replicas: 1
  selector: { matchLabels: { app: queue-worker } }
  template:
    metadata:
      labels: { app: queue-worker }
    spec:
      serviceAccountName: workload-runtime
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: worker
          image: docker.io/library/redis:7-alpine
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                redis-cli -h cache LPUSH queue-worker "$(date +%s)" >/dev/null
                redis-cli -h cache LTRIM queue-worker 0 999 >/dev/null
                sleep 5
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 5m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 64Mi }
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -h cache PING | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -h cache PING | grep -q PONG"]
            initialDelaySeconds: 30
            periodSeconds: 30
