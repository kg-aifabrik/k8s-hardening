# `migration` — one-shot Job that creates a `schema_migrations`-style
# table in postgres. Stand-in for the migration step every real app
# runs once per deploy.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels: { app: migration }
    spec:
      serviceAccountName: workload-runtime
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile: { type: RuntimeDefault }
      initContainers:
        # Wait for db to accept connections before the main migration runs.
        - name: wait-for-db
          image: docker.io/bitnami/postgresql:16
          command: ["bash", "-c"]
          args:
            - |
              for i in $(seq 1 60); do
                if pg_isready -U postgres -h db-0.db -p 5432 >/dev/null 2>&1; then
                  echo "db ready"
                  exit 0
                fi
                sleep 5
              done
              echo "db never became ready" >&2
              exit 1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 5m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 64Mi }
      containers:
        - name: migrate
          image: docker.io/bitnami/postgresql:16
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: db-credentials, key: password } }
          command: ["bash", "-c"]
          args:
            - |
              set -e
              psql "host=db-0.db user=postgres dbname=postgres" <<'SQL'
              CREATE TABLE IF NOT EXISTS schema_migrations (
                version    BIGINT PRIMARY KEY,
                applied_at TIMESTAMPTZ NOT NULL DEFAULT now()
              );
              INSERT INTO schema_migrations (version)
                VALUES (20260520001)
                ON CONFLICT DO NOTHING;
              SELECT * FROM schema_migrations ORDER BY version;
              SQL
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 128Mi }
          volumeMounts:
            - { name: scratch, mountPath: /tmp }
      volumes:
        - name: scratch
          emptyDir: {}
