# Self-signed cluster-wide issuer for the framework test.
#
# Real deployments would use ACME / Let's Encrypt or an internal CA;
# self-signed is fine for proving the cert-manager pipeline works
# end-to-end without depending on external DNS or HTTP challenges.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-cluster-issuer
spec:
  selfSigned: {}
